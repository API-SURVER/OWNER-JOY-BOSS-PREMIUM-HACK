        :root {

        .main-card {
            background: linear-gradient(180deg, #ff5f6d, #ffc371);
            border-radius: 20px;
            padding: 15px 10px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.3);
            position: relative;
        }

        .rocket-badge {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 55px;
            height: 55px;
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            border-radius: 50%;
            border: 3px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            z-index: 10;
        }

        .header-name {
            font-size: 13px;
            color: #fff;
            margin-top: 25px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 900;
        }

        .ticket-area {
            background: #fff;
            border-radius: 12px;
            padding: 10px 8px;
            position: relative;
        }

        .side-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .side-box {
            flex: 1;
            padding: 6px 0;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 900;
            color: #ccc;
            background: #f5f5f5;
            transition: 0.3s;
            border: 1.5px solid #eee;
        }

        .active-big {
            background: var(--green) !important;
            color: #fff !important;
            border-color: #008f4c !important;
            box-shadow: 0 3px 8px rgba(0, 255, 136, 0.4);
        }

        .active-small {
            background: var(--red) !important;
            color: #fff !important;
            border-color: #b30000 !important;
            box-shadow: 0 3px 8px rgba(255, 62, 62, 0.4);
        }

        .timer-info {
            font-family: 'JetBrains Mono', monospace;
            font-size: 8.5px;
            color: #777;
            border-top: 1px solid #f0f0f0;
            padding-top: 5px;
            line-height: 1.4;
        }

        .btn-group {
            display: flex;
            gap: 5px;
            margin-top: 10px;
            justify-content: center;
        }

        .btn {
            padding: 5px 12px;
            border-radius: 15px;
            border: none;
            font-weight: 900;
            font-size: 10px;
            cursor: pointer;
        }

        .hide-btn { background: rgba(255,255,255,0.3); color: #fff; }
        .exit-btn { background: #333; color: #fff; }

        #login-section { padding: 35px 5px 5px; }
        .input-field {
            width: 85%; padding: 8px; border-radius: 8px;
            border: none; margin-bottom: 10px; text-align: center; font-size: 12px;
            font-weight: bold;
        }

        #mini-icon {
            position: fixed; top: 150px; left: 0;
            width: 38px; height: 38px; background: #ff5f6d;
            border-radius: 0 50% 50% 0; display: none;
            align-items: center; justify-content: center; z-index: 10000;
        }
    </style>
</head>

    <div class="tool-box" id="dragBox">
        <div class="main-card">
            <div class="rocket-badge">🚀</div>

            <div id="login-section">
                <!-- পাসওয়ার্ড হাইড করার জন্য type="password" করা হয়েছে -->

                    <div class="side-container">
                        <div id="side-big" class="side-box">BIG</div>
                        <div id="side-small" class="side-box">SMALL</div>
                    </div>
                    
                    <div class="timer-info">
                        Period: <span id="period-id" style="color:#000; font-weight:bold;">Loading...</span><br>
                        Wait for: <span id="timer-sec" style="color:#ff3e3e; font-weight:bold;">30</span>s

    <div id="mini-icon" onclick="showBox()">
        <span style="font-size:20px;">🚀</span>
    </div>

    <script>
        // আপনার দেওয়া সিকোয়েন্স/লজিক
        const myLogic = ["BIG", "BIG", "SMALL", "SMALL", "BIG", "SMALL", "BIG", "BIG", "BIG", "SMALL", "SMALL", "SMALL", "BIG", "SMALL", "BIG", "BIG", "SMALL", "BIG", "SMALL", "SMALL"];

        function startApp() {
            if(document.getElementById("key-input").value === "724671") {
                document.getElementById("login-section").style.display = "none";
                document.getElementById("main-section").style.display = "block";
                runLogicEngine();
            } else { alert("WRONG KEY!"); }
        }

        const box = document.getElementById("dragBox");
        let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

        box.addEventListener("touchstart", (e) => {
            if(e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
            initialX = e.touches[0].clientX - xOffset;
            initialY = e.touches[0].clientY - yOffset;
            active = true;
        });
        document.addEventListener("touchend", () => active = false);
        document.addEventListener("touchmove", (e) => {
            if (active) {
                e.preventDefault();
                currentX = e.touches[0].clientX - initialX;
                currentY = e.touches[0].clientY - initialY;
                xOffset = currentX; yOffset = currentY;
                box.style.transform = `translate3d(${currentX}px, ${currentY}px, 0) translateX(-50%)`;
            }
        });

        function hideBox() { box.style.display = "none"; document.getElementById("mini-icon").style.display = "flex"; }
        function showBox() { box.style.display = "block"; document.getElementById("mini-icon").style.display = "none"; }

        function runLogicEngine() {
            function update() {
                const now = new Date();
                const Y = now.getFullYear(), M = String(now.getMonth() + 1).padStart(2, '0'), D = String(now.getDate()).padStart(2, '0');
                
                // পিরিয়ড ইনডেক্স বের করা
                const totalSecToday = (now.getHours() * 3600) + (now.getMinutes() * 60) + now.getSeconds();
                const periodIndex = Math.floor(totalSecToday / 30);
                const periodID = `${Y}${M}${D}1000${String(periodIndex + 1).padStart(5, '0')}`;
                
                // লজিক সিলেকশন: পিরিয়ড ইনডেক্স অনুযায়ী আপনার দেওয়া ২০টি প্রেডিকশন ঘুরবে
                const result = myLogic[periodIndex % myLogic.length];
                
                const sideBig = document.getElementById("side-big");
                const sideSmall = document.getElementById("side-small");

                sideBig.classList.remove("active-big");
                sideSmall.classList.remove("active-small");

                if(result === "BIG") sideBig.classList.add("active-big");
                else sideSmall.classList.add("active-small");

                document.getElementById("period-id").innerText = periodID;
                document.getElementById("timer-sec").innerText = 30 - (now.getSeconds() % 30);
            }
            setInterval(update, 1000);
            update();
        }
    </script>
